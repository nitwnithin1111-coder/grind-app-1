
                        <!DOCTYPE html>
                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                body {
                  background-color: white; /* Ensure the iframe has a white background */
                }

                
              </style>
                        </head>
                        <body>
                            <!-- Update to Main HTML Head / Layout Setup -->
<!-- Insert these tags inside <head>, ideally right after your existing <meta> and <link> tags. -->

<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json" />

<!-- Theme & Apple meta tags -->
<meta name="theme-color" content="#2ecc71" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GRIND" />
<link rel="apple-touch-icon" href="/icon.png" />

<!-- Service Worker registration (place before </body> or inline in <head>) -->
<script>
  window.addEventListener('load', () => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/sw.js')
        .then((reg) => {
          console.info('[GRIND] SW registered — scope:', reg.scope);
        })
        .catch((err) => {
          console.warn('[GRIND] SW registration failed:', err);
        });
    }
  });
</script>
<!-- UI App Download Banner / Button Component -->
<!-- Paste this block just inside <body> (so it renders above the #app shell). -->

<div id="grind-install-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9998;align-items:center;gap:14px;padding:14px 18px;background:linear-gradient(180deg,#161A21 0%,#0E1116 100%);border-bottom:1px solid #262D38;box-shadow:0 10px 30px rgba(0,0,0,.55);font-family:var(--font-body,'Manrope',system-ui,-apple-system,sans-serif);transform:translateY(-110%);opacity:0;transition:transform .4s cubic-bezier(.2,.7,.2,1),opacity .35s ease;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);">
  <img id="grind-install-icon" src="/icon.png" alt="GRIND" onerror="this.style.visibility='hidden'" style="width:42px;height:42px;border-radius:11px;flex-shrink:0;background:#1B2029;border:1px solid #262D38;object-fit:cover;box-shadow:0 4px 14px rgba(46,204,113,.18);" />
  <div style="flex:1;min-width:0;">
    <div style="font-size:14px;font-weight:800;color:#EDEFF3;letter-spacing:.2px;display:flex;align-items:center;gap:8px;">
      Install GRIND
      <span style="font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:2px 7px;border-radius:999px;background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.35);letter-spacing:.5px;">PWA</span>
    </div>
    <div style="font-size:12px;color:#9AA4B2;margin-top:3px;line-height:1.45;">Add to your home screen for offline access &amp; faster study sessions.</div>
  </div>
  <button id="grind-install-btn" style="flex-shrink:0;padding:10px 20px;background:#2ecc71;color:#06231A;border:none;border-radius:11px;font-size:12.5px;font-weight:800;letter-spacing:.3px;cursor:pointer;box-shadow:0 8px 22px rgba(46,204,113,.3);transition:transform .15s ease,box-shadow .2s ease,background .15s ease,opacity .15s ease;font-family:inherit;white-space:nowrap;">Install App</button>
  <button id="grind-install-close" style="flex-shrink:0;background:transparent;border:none;color:#5C6675;cursor:pointer;padding:6px;font-size:20px;line-height:1;transition:color .15s ease,transform .15s ease;" aria-label="Close install banner" title="Dismiss">&times;</button>
</div>

<script>
(function () {
  let deferredInstallPrompt = null;
  const banner   = document.getElementById('grind-install-banner');
  const installBtn = document.getElementById('grind-install-btn');
  const closeBtn = document.getElementById('grind-install-close');

  // Respect the user's previous "not now" choice across sessions.
  function wasDismissed() {
    try { return localStorage.getItem('grind-install-dismissed') === '1'; }
    catch (_) { return false; }
  }
  function markDismissed() {
    try { localStorage.setItem('grind-install-dismissed', '1'); } catch (_) {}
  }

  function isRunningStandalone() {
    try {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    } catch (_) { return false; }
  }

  function showBanner() {
    if (isRunningStandalone() || wasDismissed()) return;
    banner.style.display = 'flex';
    // Force layout before animating so the transform transition plays.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        banner.style.transform = 'translateY(0)';
        banner.style.opacity   = '1';
      });
    });
  }

  function hideBanner() {
    banner.style.transform = 'translateY(-110%)';
    banner.style.opacity   = '0';
    setTimeout(() => { banner.style.display = 'none'; }, 420);
  }

  // Capture the native install prompt event.
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    showBanner();
  });

  // Primary install action.
  installBtn.addEventListener('click', async () => {
    if (!deferredInstallPrompt) { hideBanner(); return; }

    installBtn.disabled   = true;
    installBtn.textContent = 'Installing…';
    installBtn.style.opacity = '0.8';

    try {
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice;

      if (choice.outcome === 'accepted') {
        hideBanner();
      } else {
        // User cancelled — restore the button so they can try again later.
        installBtn.disabled    = false;
        installBtn.textContent = 'Install App';
        installBtn.style.opacity = '1';
      }
    } catch (err) {
      console.warn('[GRIND] Install prompt error:', err);
      installBtn.disabled    = false;
      installBtn.textContent = 'Install App';
      installBtn.style.opacity = '1';
    } finally {
      deferredInstallPrompt = null;
    }
  });

  // Dismiss the banner without installing.
  closeBtn.addEventListener('click', () => {
    hideBanner();
    markDismissed();
  });

  // Clean up if the app actually gets installed (also fires on desktop Chrome).
  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    hideBanner();
  });

  // Subtle hover micro-interactions.
  installBtn.addEventListener('mouseenter', () => {
    if (installBtn.disabled) return;
    installBtn.style.transform  = 'translateY(-1px)';
    installBtn.style.boxShadow  = '0 12px 28px rgba(46,204,113,.45)';
    installBtn.style.background = '#34d67a';
  });
  installBtn.addEventListener('mouseleave', () => {
    installBtn.style.transform  = '';
    installBtn.style.boxShadow  = '0 8px 22px rgba(46,204,113,.3)';
    installBtn.style.background = '#2ecc71';
  });
  closeBtn.addEventListener('mouseenter', () => {
    closeBtn.style.color     = '#EDEFF3';
    closeBtn.style.transform = 'rotate(90deg)';
  });
  closeBtn.addEventListener('mouseleave', () => {
    closeBtn.style.color     = '#5C6675';
    closeBtn.style.transform = '';
  });
})();
</script>


              <script>
                              // /public/sw.js
// GRIND — performance-efficient service worker
// Network-first pass-through. No aggressive caching.

const CACHE_NAME = 'grind-shell-v1';

self.addEventListener('install', (event) => {
  // Skip the "waiting" phase so the new SW activates immediately.
  self.skipWaiting();
});

self.addEventListener('activate', (event) => {
  // Clean up old caches and take control of all open clients right away.
  event.waitUntil(
    caches
      .keys()
      .then((keys) =>
        Promise.all(
          keys
            .filter((k) => k !== CACHE_NAME)
            .map((k) => caches.delete(k))
        )
      )
      .then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', (event) => {
  const req = event.request;

  // Only handle GET requests — let POST/PUT/PATCH/DELETE go straight through.
  if (req.method !== 'GET') return;

  // Skip chrome-extension and non-http(s) schemes.
  if (!req.url.startsWith('http')) return;

  // Network pass-through with a graceful offline fallback when available.
  event.respondWith(
    fetch(req)
      .then((networkRes) => {
        // Update the cache with a fresh copy for future offline reads,
        // but do not pre-cache anything the user never requested.
        if (networkRes && networkRes.status === 200 && networkRes.type === 'basic') {
          const copy = networkRes.clone();
          caches.open(CACHE_NAME).then((cache) => cache.put(req, copy));
        }
        return networkRes;
      })
      .catch(() => caches.match(req))
  );
});


              </script>
                        </body>
